  <defs>
    <radialGradient id="__bgGrad" cx="40%" cy="35%" r="75%" gradientUnits="userSpaceOnUse" gradientTransform="scale(725,989)">
    <stop offset="0%" stop-color="#06070f"/>
    <stop offset="50%" stop-color="#0d0f1e"/>
    <stop offset="100%" stop-color="#06070f"/>
  </radialGradient>
<filter id="__bg_blur"><feGaussianBlur stdDeviation="60"/></filter>

<filter id="__shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
  <feDropShadow dx="0" dy="8" stdDeviation="12"
    flood-color="#000" flood-opacity="0.2"/>
  <feDropShadow dx="0" dy="3.2" stdDeviation="4.800000000000001"
    flood-color="#000" flood-opacity="0.15"/>
</filter>

<filter id="__shadowSm" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
  <feDropShadow dx="0" dy="4" stdDeviation="6"
    flood-color="#000" flood-opacity="0.13999999999999999"/>
  <feDropShadow dx="0" dy="1.6" stdDeviation="2.4000000000000004"
    flood-color="#000" flood-opacity="0.105"/>
</filter>

<filter id="__glass" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
  <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
  <feColorMatrix in="noise" type="saturate" values="0" result="grayNoise"/>
  <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
  <feComposite in="blended" in2="SourceGraphic" operator="atop"/>
</filter>

<filter id="__glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur1"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur3"/>
  <feMerge>
    <feMergeNode in="blur3"/>
    <feMergeNode in="blur2"/>
    <feMergeNode in="blur1"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<filter id="__glowEdge" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur1"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur3"/>
  <feMerge>
    <feMergeNode in="blur3"/>
    <feMergeNode in="blur2"/>
    <feMergeNode in="blur1"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

