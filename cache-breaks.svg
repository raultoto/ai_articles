    <style>* { box-sizing: border-box; }
text { user-select: none; }

@keyframes __fadeUp    { from { opacity:0; transform:translateY(16px) scale(.97) } to { opacity:1; transform:translateY(0) scale(1) } }
@keyframes __fadeDown  { from { opacity:0; transform:translateY(-16px) scale(.97) } to { opacity:1; transform:translateY(0) scale(1) } }
@keyframes __fadeLeft  { from { opacity:0; transform:translateX(16px) scale(.97) } to { opacity:1; transform:translateX(0) scale(1) } }
@keyframes __fadeRight { from { opacity:0; transform:translateX(-16px) scale(.97) } to { opacity:1; transform:translateX(0) scale(1) } }
@keyframes __zoomIn    { from { opacity:0; transform:scale(.6) } 70% { transform:scale(1.04) } to { opacity:1; transform:scale(1) } }
@keyframes __pop       { from { opacity:0; transform:scale(.5) } 60% { transform:scale(1.12) } 80% { transform:scale(.96) } to { opacity:1; transform:scale(1) } }
@keyframes __draw      { to   { stroke-dashoffset:0 } }
@keyframes __pulse     { 0%,100% { transform:scale(1) } 50% { transform:scale(1.05) } }
@keyframes __glowPulse { 0%,100% { filter:drop-shadow(0 0 4px currentColor) } 50% { filter:drop-shadow(0 0 14px currentColor) drop-shadow(0 0 28px currentColor) } }
@keyframes __shimmer   { from { background-position:200% center } to { background-position:-200% center } }
@keyframes __float     { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-6px) } }
@keyframes __spin      { from { transform:rotate(0deg) } to { transform:rotate(360deg) } }

._a41{animation: __fadeUp 500ms cubic-bezier(0.34,1.56,0.64,1) 50ms 1 forwards; opacity:0;}
@keyframes __march_42 { from { stroke-dashoffset:0 } to { stroke-dashoffset:-10 } }
._a42 { stroke-dasharray:6,4; animation:__march_42 600ms linear 0ms infinite; }
@keyframes __march_43 { from { stroke-dashoffset:0 } to { stroke-dashoffset:-10 } }
._a43 { stroke-dasharray:6,4; animation:__march_43 600ms linear 0ms infinite; }
@keyframes __march_44 { from { stroke-dashoffset:0 } to { stroke-dashoffset:-10 } }
._a44 { stroke-dasharray:6,4; animation:__march_44 600ms linear 0ms infinite; }
@keyframes __march_45 { from { stroke-dashoffset:0 } to { stroke-dashoffset:-10 } }
._a45 { stroke-dasharray:6,4; animation:__march_45 600ms linear 0ms infinite; }
._a46{animation: __glowPulse 600ms cubic-bezier(0.34,1.56,0.64,1) 0ms 1 forwards;}
._a47{animation: __pop 600ms cubic-bezier(0.34,1.56,0.64,1) 100ms 1 forwards;}
._a48{animation: __pop 600ms cubic-bezier(0.34,1.56,0.64,1) 180ms 1 forwards;}
._a49{animation: __pop 600ms cubic-bezier(0.34,1.56,0.64,1) 260ms 1 forwards;}
._a50{animation: __pop 600ms cubic-bezier(0.34,1.56,0.64,1) 340ms 1 forwards;}
._a51{animation: __pulse 600ms cubic-bezier(0.34,1.56,0.64,1) 400ms 1 forwards;}</style>
